services:
  app:
    # Uses the latest published app image from GHCR by default.
    image: ghcr.io/fifoqueue/shortlink:latest
    # Runtime ABI plugins can be copied into ./user-plugins without rebuilding
    # the image. Build-time src/user-plugins still require a custom image; for
    # that case, comment out "image" above, uncomment this build block, and run:
    # docker compose -f docs/docker-compose.yaml up -d --build
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    # Runtime app settings are loaded from the project .env file. For this
    # compose network, set DATABASE_URL/REDIS_URL/ANALYTICS_CLICKHOUSE_URL with
    # service hostnames: postgres, redis, and clickhouse.
    env_file:
      - ../.env
    volumes:
      - ../user-plugins:/app/user-plugins:ro
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      HOST: '0.0.0.0'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    # Reads POSTGRES_DB/POSTGRES_USER/POSTGRES_PASSWORD from ../.env.
    env_file:
      - ../.env
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    # Alpine-based PgBouncer image. App DATABASE_URL should point here.
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    # Reads DB_HOST/DB_PORT/DB_USER/DB_PASSWORD/DB_NAME and pool settings from ../.env.
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -h 127.0.0.1 -p 5432 -U "$$DB_USER" -d "$$DB_NAME"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Latest Redis image for shared cache, pub/sub invalidation, and streams.
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    # Latest ClickHouse image for high-volume analytics mirroring.
    image: clickhouse/clickhouse-server:latest-alpine
    restart: unless-stopped
    # Reads CLICKHOUSE_DB/CLICKHOUSE_USER/CLICKHOUSE_PASSWORD from ../.env.
    env_file:
      - ../.env
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'clickhouse-client --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --query "SELECT 1"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
